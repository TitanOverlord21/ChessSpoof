<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChessSpoof Grid</title>
  <link rel="stylesheet" href="Index.css">
</head>
<body>
  <div class="game-ui">
    <div class="score-panel">
      <p class="score-line">White: <span id="score-white">0</span></p>
      <p class="score-line">Black: <span id="score-black">0</span></p>
    </div>
    <div class="board-wrapper">
      <div class="board" id="board" aria-label="8 by 8 grid"></div>
    </div>
  </div>
  <script src="Index.js"></script>
</body>
</html>
